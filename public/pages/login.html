<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Azlon Arts ERP — Login</title>
<link rel="stylesheet" href="/css/app.css">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--ink);}
  .login-box{background:var(--panel);border-radius:6px;padding:40px 36px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.35);}
  .login-logo{text-align:center;margin-bottom:28px;}
  .login-logo h1{font-size:24px;font-weight:400;color:var(--ink);letter-spacing:0.01em;}
  .login-logo .sub{font-family:Arial,sans-serif;font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px;}
  .field{margin-bottom:16px;}
  .err{font-family:Arial,sans-serif;font-size:12px;color:var(--danger);margin-top:8px;display:none;}
  .btn-block{width:100%;justify-content:center;padding:11px;}
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <h1>Azlon Arts</h1>
    <div class="sub">ERP System</div>
  </div>
  <div class="field">
    <label>Username</label>
    <input id="username" type="text" autocomplete="username" autofocus>
  </div>
  <div class="field">
    <label>Password</label>
    <input id="password" type="password" autocomplete="current-password">
  </div>
  <div class="err" id="err"></div>
  <button class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
</div>
<script>
async function doLogin(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  const errEl=document.getElementById('errEl');
  if(!u||!p){showErr('Please enter username and password');return;}
  document.getElementById('loginBtn').disabled=true;
  try{
    const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Login failed');
    window.location='/';
  }catch(e){
    showErr(e.message);
    document.getElementById('loginBtn').disabled=false;
  }
}
function showErr(msg){
  const el=document.getElementById('err');
  el.textContent=msg;el.style.display='block';
}
document.getElementById('loginBtn').onclick=doLogin;
document.getElementById('password').onkeydown=e=>{if(e.key==='Enter')doLogin();};
document.getElementById('username').onkeydown=e=>{if(e.key==='Enter')document.getElementById('password').focus();};
</script>
</body>
</html>
